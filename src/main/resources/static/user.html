<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Panel</title>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

button {
    padding: 10px 16px;
    margin: 5px;
    border: none;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(56,189,248,0.4);
}

button:active {
    transform: scale(0.95);
}

#otpBtn.sent {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    animation: pop 0.3s ease;
}

@keyframes pop {
    0% { transform: scale(0.8); }
    100% { transform: scale(1); }
}

input {
    padding: 8px;
    border-radius: 5px;
    border: none;
    margin: 5px;
}

input:focus {
    outline: none;
    box-shadow: 0 0 10px #38bdf8;
}
</style>
</head>

<body>

<h2>👤 Join Queue</h2>

<div class="card">
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">

    <button id="otpBtn" onclick="sendOtp()">Send OTP</button>

    <br>

    <input id="otp" placeholder="Enter OTP">
    <button onclick="verify()">Verify & Join</button>
</div>

<div class="card">
    <h3 id="status">Not Joined</h3>
</div>

<audio id="beep" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

<script>
let socket = new SockJS('/ws');
let stomp = Stomp.over(socket);

let savedEmail = localStorage.getItem("userEmail");

stomp.connect({}, () => {
    stomp.subscribe('/topic/queue', (msg) => {
        updateUI(JSON.parse(msg.body));
    });
    loadQueue();
});

function sendOtp() {
    let email = document.getElementById("email").value;

    fetch(`/queue/send-otp?email=${email}`, {method:'POST'})
    .then(() => {
        let btn = document.getElementById("otpBtn");
        btn.innerText = "Sent ✔";
        btn.classList.add("sent");
    });
}

function verify() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let otp = document.getElementById("otp").value;

    fetch(`/queue/verify-otp?name=${name}&email=${email}&otp=${otp}`, {method:'POST'})
    .then(res => {
        if (!res.ok) throw new Error("Invalid OTP");
        return res.text();
    })
    .then(() => {
        localStorage.setItem("userEmail", email);
        savedEmail = email;
        loadQueue();
    })
    .catch(err => alert(err.message));
}

function loadQueue() {
    fetch(`/queue`)
    .then(res => res.json())
    .then(data => updateUI(data));
}

function updateUI(queue) {

    if (!savedEmail) return;

    let found = queue.find(u => u.email === savedEmail);

    if (found) {
        document.getElementById("status").innerText =
            `Position: ${found.position} | Wait: ${formatTime(found.waitTime)}`;

        if (found.waitTime <= 60) {
            document.getElementById("beep").play();
        }

    } else {
        document.getElementById("status").innerText = "✅ Done!";
        localStorage.removeItem("userEmail");
    }
}

function formatTime(s) {
    let m = Math.floor(s/60);
    let sec = s%60;
    return `${m}m ${sec}s`;
}
</script>

</body>
</html>
